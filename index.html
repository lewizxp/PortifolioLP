<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─ SEO básico ─ -->
    <title>Luiz Pedro — Full Stack Developer</title>
    <meta name="description" content="Portfólio de Luiz Pedro, Full Stack Developer especializado em React, Next.js, Node.js e TypeScript. Disponível para projetos freelance e posições full-time." />
    <meta name="author" content="Luiz Pedro" />
    <meta name="keywords" content="full stack developer, react, node.js, typescript, portfolio, desenvolvedor, freelance" />

    <!-- ─ Open Graph (aparece quando alguém compartilha o link no WhatsApp, LinkedIn, etc.) ─ -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Luiz Pedro — Full Stack Developer" />
    <meta property="og:description" content="Portfólio profissional com projetos em React, Node.js e TypeScript." />
    <meta property="og:url"         content="https://luizpedro.dev" />
    <!-- ↓ coloque uma imagem de preview (1200x630px) na pasta /public/ -->
    <meta property="og:image"       content="/og-image.png" />

    <!-- ─ Twitter Card ─ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Luiz Pedro — Full Stack Developer" />
    <meta name="twitter:description" content="Portfólio profissional com projetos em React, Node.js e TypeScript." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ─ Favicon ─ -->
    <!-- Coloque seu favicon.ico dentro da pasta /public/ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─ Preconnect para as fontes (melhora performance) ─ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
